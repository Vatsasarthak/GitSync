<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFG Sync — Modern Developer Workflow</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>

  <div class="container">
    <header class="staggered">
      <div class="logo-section">
        <div class="logo-icon-wrap">
          <div class="icon-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4M14.5 4l-5 16"/></svg>
          </div>
          <div class="separator-dot"></div>
          <div class="icon-box github">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.28 1.15-.28 2.35 0 3.5-.73 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/></svg>
          </div>
        </div>
        <div class="status-badge">
           <div class="status-indicator"></div>
           <span>System Ready</span>
        </div>
      </div>
      <div class="app-identity">
        <h1>GFG<span class="highlight">Sync</span></h1>
      </div>
    </header>

    <!-- Stats Dashboard -->
    <div class="stats-grid staggered">
      <div class="stat-card">
        <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span class="stat-value" id="total-solved">0</span>
        <span class="stat-label">Resolved</span>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" style="color: var(--accent-amber);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span class="stat-value" id="current-streak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" style="color: var(--accent-rose);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span class="stat-value" id="queue-count">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <div class="sync-meta staggered">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Last Activity:</span>
      <span class="value" id="last-synced">None</span>
    </div>

    <!-- Auth Section: Logged Out -->
    <div id="auth-section" class="auth-container staggered">
      <div class="auth-title">Welcome to GFG Sync</div>
      <p class="auth-desc">Sync your GeeksforGeeks solutions to GitHub automatically with our Smart Sync engine.</p>
      <button id="login-btn" class="btn btn-github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.28 1.15-.28 2.35 0 3.5-.73 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/></svg>
        <span>Connect GitHub Account</span>
        <div class="spinner" style="display: none;"></div>
      </button>
    </div>

    <!-- Main Section: Logged In -->
    <div id="main-section" style="display: none;">
      <div class="profile-card staggered" style="margin-bottom: 20px;">
        <img id="user-avatar" src="" alt="" class="avatar">
        <div class="user-details">
          <span id="user-name" class="username">Loading Profile...</span>
          <button id="logout-btn" class="logout-btn">Disconnect Session</button>
        </div>
        <svg style="color: var(--primary); width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>

      <div class="control-group staggered" style="margin-bottom: 20px;">
        <label class="control-label">
          <svg style="width: 14px; height: 14px; margin-right: 4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
          CONNECTED REPOSITORY
        </label>
        <div class="select-container">
          <select id="repo-select">
            <option value="">Fetching repositories...</option>
          </select>
          <button id="refresh-repos-btn" class="icon-btn" title="Refresh list">
            <svg style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          </button>
        </div>
      </div>

      <div class="toggle-panel staggered" style="margin-bottom: 24px;">
        <div class="toggle-info">
          <svg style="color: var(--primary); width: 18px; height: 18px; margin-right: 8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>
          <span>Smart Sync Engine</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="auto-sync-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="btn-group staggered">
        <button id="push-manual-btn" class="btn btn-primary">
          <svg style="width: 16px; height: 16px; margin-right: 6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          <span>Auto Push</span>
          <div class="spinner" style="display: none;"></div>
        </button>
        <button id="retry-queue-btn" class="btn btn-secondary">
          <svg style="width: 16px; height: 16px; margin-right: 6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>
          <span>Process</span>
          <div class="spinner" style="display: none;"></div>
        </button>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div class="debug-panel staggered">
      <div class="debug-header">
        <label class="debug-label">
          <svg style="width: 12px; height: 12px; margin-right: 4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Developer Logs
        </label>
        <label class="switch" style="width: 32px; height: 16px;">
          <input type="checkbox" id="debug-toggle">
          <span class="slider" style="border-radius: 10px;"></span>
        </label>
      </div>
      <pre id="debug-logs" style="display: none;"></pre>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
